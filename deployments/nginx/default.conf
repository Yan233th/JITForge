resolver 127.0.0.11 valid=10s ipv6=off;

map $http_x_forwarded_proto $jitforge_forwarded_proto {
    ""      $scheme;
    default $http_x_forwarded_proto;
}

upstream jitforge_server {
    zone jitforge_server 64k;
    server server:8080 resolve;
    keepalive 32;
}

server {
    listen 8080;
    server_name _;

    # Match jit-server's request limit instead of nginx's 1 MiB default.
    client_max_body_size 6m;

    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Proto $jitforge_forwarded_proto;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # Public landing page. The application keeps its real /ui/ and /v1/ paths.
    location = / {
        root /srv/jitforge/landing;
        try_files /index.html =404;
        add_header Cache-Control "no-cache";
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'none'; form-action 'self'; frame-ancestors 'none'" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location ^~ /assets/ {
        root /srv/jitforge/landing;
        try_files $uri =404;
        add_header Cache-Control "no-store" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location = /downloads/jit-linux-x86_64 {
        alias /srv/jitforge/downloads/jit-linux-x86_64;
        default_type application/octet-stream;
        add_header Content-Disposition 'attachment; filename="jit-linux-x86_64"' always;
        add_header Cache-Control "no-store" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # The report deck is mounted read-only so regenerating index.html publishes it immediately.
    location = /slides {
        return 308 $jitforge_forwarded_proto://$http_host/slides/;
    }

    location ^~ /slides/ {
        root /srv/jitforge;
        index index.html;
        try_files $uri $uri/ =404;
        add_header Cache-Control "no-cache" always;
        add_header Content-Security-Policy "default-src 'self' data:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'none'; frame-ancestors 'self'" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # The browser console and its static assets live at /ui/.
    location = /ui {
        proxy_pass http://jitforge_server;
    }

    location ^~ /ui/ {
        proxy_pass http://jitforge_server;
    }

    # The HTTP API, including browser sessions, lives at /v1/.
    location ^~ /v1/ {
        proxy_pass http://jitforge_server;
    }

    location = /healthz {
        proxy_pass http://jitforge_server;
    }

    location = /readyz {
        proxy_pass http://jitforge_server;
    }

    location / {
        return 404;
    }
}
