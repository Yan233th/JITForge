resolver 127.0.0.11 valid=10s ipv6=off;

map $http_x_forwarded_proto $jitforge_forwarded_proto {
    ""      $scheme;
    default $http_x_forwarded_proto;
}

upstream jitforge_server {
    zone jitforge_server 64k;
    server server:8080 resolve;
    keepalive 32;
}

server {
    listen 8080;
    server_name _;
    absolute_redirect off;

    client_max_body_size 6m;

    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Proto $jitforge_forwarded_proto;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    location = / {
        return 307 /ui/;
    }

    location = /ui {
        proxy_pass http://jitforge_server;
    }

    location ^~ /ui/ {
        proxy_pass http://jitforge_server;
    }

    location ^~ /v1/ {
        proxy_pass http://jitforge_server;
    }

    location = /healthz {
        proxy_pass http://jitforge_server;
    }

    location = /readyz {
        proxy_pass http://jitforge_server;
    }

    location / {
        return 404;
    }
}
