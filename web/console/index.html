<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JITForge Console</title>
  <link rel="stylesheet" href="/ui/app.css">
</head>
<body>
  <section id="login-view" class="login-layout">
    <div class="login-card">
      <a class="brand-mark" href="/" aria-label="返回 JITForge 首页">JF</a>
      <p class="eyebrow">即时工具，集中管理</p>
      <h1>Forge tools<br>on demand.</h1>
      <p class="login-meta">JITFORGE CONSOLE / LOCAL CONTROL PLANE</p>
      <p class="muted">使用配置中的共享访问令牌登录。令牌只用于本次登录，不会保存在浏览器存储中。</p>
      <form id="login-form" class="stack">
        <label>访问令牌<input id="login-token" type="password" autocomplete="current-password" required></label>
        <button type="submit" class="primary">登录</button>
      </form>
      <p id="login-error" class="error" role="alert"></p>
    </div>
  </section>

  <div id="app-shell" class="app-shell hidden">
    <aside class="sidebar">
      <a class="brand" href="/"><span class="brand-mark small">JF</span><span>JITForge</span></a>
      <nav>
        <a href="#/tools" data-nav="tools">工具</a>
        <a href="#/jobs" data-nav="jobs">合成任务</a>
        <a href="#/access" data-nav="access">外部访问</a>
        <a href="#/status" data-nav="status">系统状态</a>
      </nav>
      <div class="sidebar-footer">
        <button id="logout-button" class="ghost">退出登录</button>
      </div>
    </aside>
    <main>
      <header class="topbar">
        <div class="page-heading">
          <p id="page-label" class="page-label">工具</p>
          <h1 id="page-title">Capabilities</h1>
        </div>
        <a id="page-action" href="#/register" class="button primary hidden">注册新工具</a>
      </header>
      <section id="view" class="view" aria-live="polite"></section>
    </main>
  </div>
  <div id="toast" class="toast hidden" role="status"></div>
  <script src="/ui/app.js" defer></script>
</body>
</html>
